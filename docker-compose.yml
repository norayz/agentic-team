services:
  orchestrator:
    build: ./orchestrator
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./workspace:/workspace
    networks:
      - agentic-net

  agent-pm:
    build: ./agents
    env_file: .env
    environment:
      AGENT_NAME: pm
    command: python -m agents.pm.pm
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-team-lead:
    build: ./agents
    env_file: .env
    environment:
      AGENT_NAME: team_lead
    command: python -m agents.team_lead.team_lead
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-architect:
    build: ./agents
    env_file: .env
    environment:
      AGENT_NAME: architect
    command: python -m agents.architect.architect
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-backend:
    build: ./agents
    env_file: .env
    environment:
      AGENT_NAME: backend
    command: python -m agents.backend.backend
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-code-reviewer:
    build: ./agents
    env_file: .env
    environment:
      AGENT_NAME: code_reviewer
    command: python -m agents.code_reviewer.code_reviewer
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-qa:
    build: ./agents
    env_file: .env
    environment:
      AGENT_NAME: qa
    command: python -m agents.qa.qa
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-devops:
    build: ./agents
    env_file: .env
    environment:
      AGENT_NAME: devops
    command: python -m agents.devops.devops
    depends_on:
      - orchestrator
    networks:
      - agentic-net

networks:
  agentic-net:
    driver: bridge
