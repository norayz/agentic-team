services:
  orchestrator:
    build: .
    image: agentic-team:latest
    command: uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./workspace:/workspace
      - ~/.aws:/root/.aws:ro
    networks:
      - agentic-net

  agent-pm:
    image: agentic-team:latest
    command: python -m agents.pm.pm
    env_file: .env
    environment:
      AGENT_NAME: pm
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-team-lead:
    image: agentic-team:latest
    command: python -m agents.team_lead.team_lead
    env_file: .env
    environment:
      AGENT_NAME: team_lead
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-architect:
    image: agentic-team:latest
    command: python -m agents.architect.architect
    env_file: .env
    environment:
      AGENT_NAME: architect
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-backend:
    image: agentic-team:latest
    command: python -m agents.backend.backend
    env_file: .env
    environment:
      AGENT_NAME: backend
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-code-reviewer:
    image: agentic-team:latest
    command: python -m agents.code_reviewer.code_reviewer
    env_file: .env
    environment:
      AGENT_NAME: code_reviewer
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-qa:
    image: agentic-team:latest
    command: python -m agents.qa.qa
    env_file: .env
    environment:
      AGENT_NAME: qa
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      - orchestrator
    networks:
      - agentic-net

  agent-devops:
    image: agentic-team:latest
    command: python -m agents.devops.devops
    env_file: .env
    environment:
      AGENT_NAME: devops
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      - orchestrator
    networks:
      - agentic-net

networks:
  agentic-net:
    driver: bridge
