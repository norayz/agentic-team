version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barista-app
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/barista.db
      - PORT=3000
    volumes:
      # Persist database across restarts
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - barista-network

networks:
  barista-network:
    driver: bridge
