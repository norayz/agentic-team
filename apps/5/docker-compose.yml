version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barista-site
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Node environment
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
      # Database location (mounted volume)
      - DB_PATH=/app/db/orders.db
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Persist SQLite database across restarts
      - ./db:/app/db
      # Persist logs
      - ./logs:/app/logs
      # Optional: hot-reload for development (comment out for production testing)
      # - .:/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
