name: CI

on:
  push:
    branches: [ main, 'backend/**', 'devops/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/5/package-lock.json'
      
      - name: Install dependencies
        run: cd apps/5 && npm ci
      
      - name: Run tests
        run: cd apps/5 && npm test || echo "No test script defined"
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: cd apps/5 && docker build -t barista-app:${{ github.sha }} .
      
      - name: Test Docker image starts
        run: |
          cd apps/5
          docker run -d --name test-container -p 3000:3000 barista-app:${{ github.sha }}
          sleep 5
          docker inspect test-container --format='{{.State.Status}}' | grep -q running
          docker stop test-container
          echo "Docker image build and start test: SUCCESS"
