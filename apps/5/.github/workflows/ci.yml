name: CI

on:
  push:
    branches: [ main, 'backend/**', 'qa/**', 'devops/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/5/package-lock.json'

      - name: Install dependencies
        working-directory: apps/5
        run: npm ci

      - name: Run tests
        working-directory: apps/5
        run: npm test
        continue-on-error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: apps/5
        run: docker build -t barista-app:${{ github.sha }} .

      - name: Test Docker image builds successfully
        run: docker image inspect barista-app:${{ github.sha }} >/dev/null 2>&1 && echo "Docker image built successfully"

      - name: Start and verify container
        run: |
          docker run -d --name barista-test -p 3000:3000 barista-app:${{ github.sha }}
          sleep 5
          STATUS=$(docker inspect barista-test --format='{{.State.Status}}')
          if [ "$STATUS" != "running" ]; then
            echo "Container failed to start. Status: $STATUS"
            docker logs barista-test
            exit 1
          fi
          if docker exec barista-test wget --quiet --tries=1 --spider http://localhost:3000/ 2>/dev/null; then
            echo "Health check passed"
          else
            echo "Health check failed"
            docker logs barista-test
            exit 1
          fi

      - name: Cleanup test container
        if: always()
        run: docker rm -f barista-test 2>/dev/null || true
