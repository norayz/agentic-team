name: CI

on:
  push:
    branches: [ main, 'backend/**', 'qa/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
  
  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: docker build -t barista-site:${{ github.sha }} .
      
      - name: Test Docker image starts and is healthy
        run: |
          docker run -d --name test-container barista-site:${{ github.sha }}
          sleep 5
          
          # Verify container is running
          docker inspect test-container --format='{{.State.Status}}' | grep -q running
          if [ $? -ne 0 ]; then
            echo "Container failed to start"
            docker logs test-container
            exit 1
          fi
          
          echo "✓ Container is running"
          docker stop test-container
          docker rm test-container
      
      - name: Validate docker-compose
        run: |
          docker-compose config > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "docker-compose.yml is invalid"
            exit 1
          fi
          echo "✓ docker-compose.yml is valid"
