name: CI

on:
  push:
    branches: [ main, 'backend/**', 'qa/**', 'devops/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'apps/5/package-lock.json'
      
      - name: Install dependencies
        working-directory: apps/5
        run: npm ci
      
      - name: Lint
        working-directory: apps/5
        run: npm run lint 2>/dev/null || true
      
      - name: Run tests
        working-directory: apps/5
        run: npm test
      
      - name: Generate coverage
        working-directory: apps/5
        run: npm run coverage 2>/dev/null || true
  
  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/5
          file: apps/5/Dockerfile
          push: false
          tags: barista-site:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker image starts
        working-directory: apps/5
        run: |
          docker build -t barista-site:test .
          docker run -d --name test-container -p 3000:3000 barista-site:test
          sleep 5
          
          # Check container is running
          if ! docker inspect test-container --format='{{.State.Status}}' | grep -q running; then
            echo "Container failed to start"
            docker logs test-container
            exit 1
          fi
          
          # Check health check passes
          HEALTH=$(docker inspect test-container --format='{{.State.Health.Status}}')
          if [ "$HEALTH" != "healthy" ] && [ "$HEALTH" != "" ]; then
            echo "Container health check failed: $HEALTH"
            docker logs test-container
            exit 1
          fi
          
          # Clean up
          docker stop test-container || true
          docker rm test-container || true
