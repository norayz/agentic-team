name: CI

on:
  push:
    branches: [ main, 'backend/**', 'devops/**', 'qa/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        working-directory: apps/5
      
      - name: Run tests
        run: npm test
        working-directory: apps/5
        continue-on-error: true
      
      - name: Lint (if eslint configured)
        run: npm run lint 2>/dev/null || true
        working-directory: apps/5
  
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          cd apps/5
          docker build --no-cache -t barista:${{ github.sha }} .
      
      - name: Test Docker image starts
        run: |
          docker run -d \
            --name test-container \
            -p 3000:3000 \
            --env NODE_ENV=production \
            --env DATABASE_PATH=/app/data/barista.db \
            barista:${{ github.sha }}
          
          sleep 5
          
          CONTAINER_STATUS=$(docker inspect test-container --format='{{.State.Status}}')
          echo "Container status: $CONTAINER_STATUS"
          if [ "$CONTAINER_STATUS" != "running" ]; then
            echo "Container failed to start"
            docker logs test-container
            exit 1
          fi
          
          docker stop test-container
          docker rm test-container
