name: CI

on:
  push:
    branches: [ main, 'backend/**', 'devops/**', 'qa/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/5/package-lock.json'
      
      - name: Install dependencies
        working-directory: apps/5
        run: npm ci
      
      - name: Run tests
        working-directory: apps/5
        run: npm test 2>/dev/null || echo "No test script configured yet"
        continue-on-error: true
      
      - name: Lint
        working-directory: apps/5
        run: npm run lint 2>/dev/null || echo "No lint script configured"
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        working-directory: apps/5
        run: docker build -t barista-app:${{ github.sha }} .
      
      - name: Test Docker image starts
        run: |
          cd apps/5
          docker run -d --name test-container -p 3000:3000 barista-app:${{ github.sha }}
          sleep 5
          
          # Check container is still running
          docker inspect test-container --format='{{.State.Status}}' | grep -q running || exit 1
          
          # Check health check (if available)
          docker inspect test-container --format='{{.State.Health.Status}}' | grep -q healthy || echo "Warning: health check not running yet"
          
          # Try basic health endpoint
          curl -f http://localhost:3000/ || echo "Warning: HTTP check failed"
          
          docker stop test-container
          docker rm test-container
